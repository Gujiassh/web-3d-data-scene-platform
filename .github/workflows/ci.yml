name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - name: Install verification tools
        run: sudo apt-get update && sudo apt-get install --yes ripgrep
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm verify:docs
      - run: pnpm verify:i18n
      - run: pnpm verify:assets
      - run: pnpm verify:topology
      - run: pnpm verify:design
      - run: pnpm verify:packages
      - run: pnpm verify:smart-home
