<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>007 Hotspot Calibration</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      #app {
        position: relative;
        background: #eef2f0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .hotspot-proxies {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .hotspot-proxy {
        position: absolute;
        left: 0;
        top: 0;
        width: 24px;
        height: 24px;
        padding: 0;
        border: 2px solid transparent;
        border-radius: 50%;
        background: transparent;
        color: transparent;
        opacity: 0;
        pointer-events: auto;
        transform: translate3d(var(--hotspot-x), var(--hotspot-y), 0) translate(-50%, -50%);
      }

      .hotspot-proxy:focus-visible {
        border-color: #ffffff;
        box-shadow: 0 0 0 2px #087f5b;
        opacity: 1;
        outline: 0;
      }

      .hotspot-proxies.pointer-pass-through .hotspot-proxy {
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
